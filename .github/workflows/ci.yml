name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test — ${{ matrix.rust }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rust: ["1.75.0", stable, beta]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Test — no-default-features
        run: cargo test --no-default-features

      - name: Test — alloc only
        run: cargo test --no-default-features --features alloc

      - name: Test — all features
        run: cargo test --all-features

  bench-check:
    name: Bench compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Check benches compile
        run: cargo bench --no-run --all-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy — no-default-features
        run: cargo clippy --lib --tests --no-default-features -- -D warnings

      - name: Clippy — alloc
        run: cargo clippy --lib --tests --no-default-features --features alloc -- -D warnings

      - name: Clippy — all features
        run: cargo clippy --all-targets --all-features -- -D warnings

  no-std:
    name: no_std compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable + thumbv6m target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Check bare-metal target
        run: cargo check --target thumbv6m-none-eabi --no-default-features

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: cargo doc
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt
        run: cargo fmt --all --check